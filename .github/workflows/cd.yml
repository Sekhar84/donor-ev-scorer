# ─────────────────────────────────────────────────────────────────────────
# CD — Continuous Deployment
# Runs ONLY on push to main branch
#
# Steps:
#   1. Build Docker image
#   2. Push to Docker Hub
#   3. SSH into EC2
#   4. Pull new image
#   5. Stop old container
#   6. Start new container
#   7. Health check — rollback if fails
# ─────────────────────────────────────────────────────────────────────────

name: CD

on:
  push:
    branches: ["main"]     # ONLY deploy when code merges to main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout code ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Log in to Docker Hub ──────────────────────────────────
      # Uses secrets — never hardcoded
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Step 3: Build and push Docker image ───────────────────────────
      # Build for linux/amd64 to match EC2 t3.small (Intel/AMD instance)
      # GitHub Actions runners are also AMD64 — no cross-compilation needed
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/donor-ev-scorer:latest
            ${{ secrets.DOCKER_USERNAME }}/donor-ev-scorer:${{ github.sha }}

      # ── Step 4: Deploy to EC2 via SSH ─────────────────────────────────
      # Writes the SSH key from secrets to a temp file
      # SSHs into EC2, pulls new image, restarts container
      - name: Deploy to EC2
        env:
          EC2_HOST:    ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          IMAGE:       ${{ secrets.DOCKER_USERNAME }}/donor-ev-scorer:${{ github.sha }}
        run: |
          # Write SSH key to temp file
          echo "$EC2_SSH_KEY" > /tmp/ec2_key.pem
          chmod 400 /tmp/ec2_key.pem

          # SSH into EC2 and deploy
          ssh -i /tmp/ec2_key.pem \
              -o StrictHostKeyChecking=no \
              ec2-user@$EC2_HOST << EOF

            echo "=== Deploying $IMAGE ==="

            # Pull new image
            docker pull $IMAGE

            # Stop and remove old container (ignore error if not running)
            docker stop ev-scorer 2>/dev/null || true
            docker rm   ev-scorer 2>/dev/null || true

            # Start new container
            docker run -d \
              --name ev-scorer \
              --restart unless-stopped \
              -p 8080:80 \
              -e CAMPAIGN_TYPE=FID \
              -e COST_PER_MAIL=1.50 \
              -e MODEL_VERSION=${{ github.sha }} \
              $IMAGE

            echo "=== Container started ==="
            docker ps | grep ev-scorer

          EOF

      # ── Step 5: Health check — verify deployment succeeded ────────────
      # Waits 5 minutes for container to start (it trains models on boot)
      # Rolls back to previous image if health check fails
      - name: Health check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Waiting 8 minutes for container to start (runs full train pipeline on boot)..."
          echo "Target: http://$EC2_HOST:8080/health"
          sleep 480

          # Try health check up to 8 times with 30s gaps
          for i in 1 2 3 4 5 6 7 8; do
            echo "Health check attempt $i..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              http://$EC2_HOST:8080/health --max-time 10 || echo "000")

            if [ "$RESPONSE" == "200" ]; then
              echo "✅ Health check passed (HTTP $RESPONSE)"
              exit 0
            else
              echo "⚠️  Health check failed (HTTP $RESPONSE) — waiting 30s..."
              sleep 30
            fi
          done

          echo "❌ Health check failed after 8 attempts — deployment failed"
          exit 1

      # ── Step 6: Notify deployment result ──────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful"
            echo "   Image: ${{ secrets.DOCKER_USERNAME }}/donor-ev-scorer:${{ github.sha }}"
            echo "   Host:  ${{ secrets.EC2_HOST }}:8080"
          else
            echo "❌ Deployment failed"
            echo "   Check logs above for details"
            echo "   EC2 may still be running the previous version"
          fi
